name: Performance Benchmarking

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  benchmark:
    name: Core Engine Latency Tracking
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Engine & Profiling Tools
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: ⏱️ Profile Code Execution Speeds
        run: |
          python -m benchmarks.inference --iterations 200 --warmup 20 > benchmark-results.json

      - name: 📎 Upload benchmark evidence
        uses: actions/upload-artifact@v4
        with:
          name: inference-benchmark
          path: benchmark-results.json
