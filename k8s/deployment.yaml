apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepsequence-recommender
  labels:
    app: deepsequence
spec:
  replicas: 3
  selector:
    matchLabels:
      app: deepsequence
  template:
    metadata:
      labels:
        app: deepsequence
    spec:
      containers:
        - name: deepsequence
          image: your-docker-registry/deepsequence-recommender:1.1.0
          ports:
            - containerPort: 8000
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: deepsequence-secrets
                  key: api-key
            - name: ENVIRONMENT
              value: "production"
            - name: MODEL_BUNDLE_PATH
              value: "/models/current"
          volumeMounts:
            - name: model-bundle
              mountPath: /models/current
              readOnly: true
          readinessProbe:
            httpGet:
              path: /recommendations/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /recommendations/health
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: model-bundle
          persistentVolumeClaim:
            claimName: deepsequence-model-bundle
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
