version: "3.9"

services:
  api:
    build: .
    container_name: deepsequence-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      MODEL_BUNDLE_PATH: /models/current
    volumes:
      - ./models/current:/models/current:ro
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
